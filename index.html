<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 新增：QQ浏览器兼容 -->
<meta name="referrer" content="no-referrer">
<title>员工查询系统 - 内部版</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: "Microsoft YaHei", sans-serif;
  background-color: #f0f8ff;
  color: #333;
  line-height: 1.6;
}
/* 顶部声明栏 */
.header-notice {
  background-color: #e3f2fd;
  color: #1976d2;
  padding: 12px 20px;
  text-align: center;
  font-size: 14px;
  border-bottom: 1px solid #bbdefb;
}
/* 主容器 */
.container {
  max-width: 500px;
  margin: 30px auto;
  padding: 0 20px;
}
/* 登录/查询区域卡片 */
.card {
  background: white;
  border-radius: 12px;
  padding: 30px;
  box-shadow: 0 4px 12px rgba(0, 123, 255, 0.1);
}
h2 {
  color: #1976d2;
  margin-bottom: 25px;
  text-align: center;
  font-size: 22px;
}
input {
  width: 100%;
  padding: 12px 15px;
  margin: 10px 0;
  border: 1px solid #bbdefb;
  border-radius: 8px;
  font-size: 16px;
  background-color: #f5faff;
}
input:focus {
  outline: none;
  border-color: #1976d2;
  box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
}
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background-color: #2196f3;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.3s;
}
button:hover {
  background-color: #1976d2;
}
#result {
  margin-top: 25px;
  padding: 20px;
  background-color: #f5faff;
  border-radius: 8px;
  border: 1px solid #e3f2fd;
}
img {
  max-width: 180px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0, 123, 255, 0.15);
  display: block;
  margin: 0 auto 15px;
}
.info {
  font-size: 15px;
  color: #333;
  text-align: left;
}
.info strong {
  color: #1976d2;
  font-size: 18px;
  display: block;
  margin-bottom: 8px;
  text-align: center;
}
/* 错误提示 */
.error {
  color: #d32f2f;
  text-align: center;
  margin-top: 15px;
}
</style>
</head>
<body>
<!-- 顶部声明 -->
<div class="header-notice">
  本系统为内部使用平台，仅用于内部工作用途，严禁外部传播、转载。如有侵权请联系管理员立即删除。
</div>

<div class="container">
  <!-- 登录区域 -->
  <div id="loginArea" class="card">
    <h2>员工查询系统</h2>
    <input type="password" id="password" placeholder="请输入访问密码">
    <button onclick="login()">验证进入</button>
  </div>

  <!-- 查询区域 -->
  <div id="searchArea" class="card" style="display:none">
    <h2>员工信息查询</h2>
    <input type="text" id="name" placeholder="输入员工姓名">
    <button onclick="search()">查询</button>
    <div id="result"></div>
  </div>
</div>

<script>
const PASSWORD = "11111111";

const users = [
  { name: "冯光武", photo: "冯光武.jpg", info: "安规考试成绩：100<br>人员资质：高压电工证（有效期2024年5月10日-2030年5月9日）" },
  { name: "冯乔海", photo: "冯乔海.jpg", info: "安规考试成绩：100<br>人员资质：高压电工证（有效期2023年8月10日-2029年8月9日）" },
  { name: "冯乔伦", photo: "冯乔伦.jpg", info: "安规考试成绩：100<br>人员资质：配电两种人（考试时间2025年11月25日）" },
  { name: "冯小建", photo: "冯小建.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "冯于志", photo: "冯于志.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "郭贵勇", photo: "郭贵勇.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "郭小兵", photo: "郭小兵.jpg", info: "安规考试成绩：100<br>人员资质：高压电工证（有效期2023年8月10日-2029年8月9日）" },
  { name: "郭正江", photo: "郭正江.jpg", info: "安规考试成绩：90<br>人员资质：无" },
  { name: "蒋顺", photo: "蒋顺.jpg", info: "安规考试成绩：90<br>人员资质：无" },
  { name: "李映忠", photo: "李映忠.jpg", info: "安规考试成绩：90<br>人员资质：无" },
  { name: "林汝志", photo: "林汝志.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "刘清河", photo: "刘清河.jpg", info: "安规考试成绩：100<br>人员资质：吊车司机资质（有效期2025年9月8日到长期）" },
  { name: "龙迪", photo: "龙迪.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "欧书龙", photo: "欧书龙.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "韦昌海", photo: "韦昌海.jpg", info: "安规考试成绩：90<br>人员资质：无" },
  { name: "于以明", photo: "于以明.jpg", info: "安规考试成绩：100<br>人员资质：高压电工证（有效期2024年11月1日-2030年10月31日）" },
  { name: "张伯超", photo: "张伯超.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "赵龙龙", photo: "赵龙龙.jpg", info: "安规考试成绩：100<br>人员资质：无" },
  { name: "周荣亮", photo: "周荣亮.jpg", info: "安规考试成绩：100<br>人员资质：配电两种人（考试时间2025年8月25日）" },
  { name: "邹加兵", photo: "邹加兵.jpg", info: "安规考试成绩：100<br>人员资质：低压电工证（有效期2022年11月14日-2028年11月13日）" }
];

function login() {
  let pwd = document.getElementById("password").value.trim();
  if (pwd === PASSWORD) {
    document.getElementById("loginArea").style.display = "none";
    document.getElementById("searchArea").style.display = "block";
  } else {
    alert("密码错误，请重新输入！");
  }
}

function search() {
  let n = document.getElementById("name").value.trim();
  let u = users.find(x => x.name === n);
  let resultDiv = document.getElementById("result");
  if (u) {
    // 关键修改：给img加上crossorigin="anonymous"
    resultDiv.innerHTML = 
      `<img src="${u.photo}" alt="${u.name}" crossorigin="anonymous"><div class="info"><strong>${u.name}</strong>${u.info}</div>`;
  } else {
    resultDiv.innerHTML = "<p class='error'>未找到该员工</p>";
  }
}
</script>
</body>
</html>
